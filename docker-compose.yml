services:
  backend:
    build:
      context: ./backend
    container_name: effective_mobile_backend
    expose:
      - "8080"
    networks:
      - effective_mobile_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine
    container_name: effective_mobile_nginx
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - effective_mobile_net

networks:
  effective_mobile_net:
    driver: bridge
